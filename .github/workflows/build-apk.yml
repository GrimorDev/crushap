name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      # CRUSHAP_SERVER_URL (Settings → Secrets and variables → Actions →
      # Variables, repo-level) bakes your deployed server's address into
      # the APK so users never have to type it in by hand — see
      # DEPLOYMENT.md "Baking in your server address". Safe to leave unset:
      # the app just falls back to asking on first launch, like before.
      - run: flutter build apk --release --dart-define=DEFAULT_SERVER_URL=${{ vars.CRUSHAP_SERVER_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: crushap-release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
